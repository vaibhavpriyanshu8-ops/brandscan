ipal region\n5. to find the perception about syndicate bank's image\n6. to find the perception about syndicate bank's single window service\n7. to find the perception about syndicate bank's personnel",leader:"Sandeep Gulati",status:"Completed",studyTypes:["Awareness & Personality of Brands","Consumer Perception & Attitude"]},{id:20,year:1995,company:"BPL India Ltd",industry:"Durables",title:"Consumer Perception Of Lifestyle Products Electric Shaver And Hair Dryer",objectives:"1. hierarchy of durable purchase\n2. demand estimation of electric shavers and hair dryers and the importance of attachments and price levels\n3. profile and perception of consumers\n4. what is that the consumers look for in a hair dryer\n5. performance of electric shaver vis a vis traditional methods of shaving\n6. barriers to adoption of electric shavers and hair dryers",leader:"Yogesh Mokashi",status:"Completed",studyTypes:["Consumer Lifestyle Measurement","Consumer Perception & Attitude","Competitor analysis and benchmarking"]},{id:21,year:1995,company:"Hindustan Lever Ltd",industry:"FMCG",title:"Activities And Interests Of The Liril Target Segment",objectives:"1. To identify the activities that the target segment indulges in which FUN, FANTASY, YOUTH, MODERNITY, and EXUBERANCE. 2. To identify the activities that the target segment indulges in which FUN, FANTASY, YOUTH, MODERNITY, and EXUBERANCE if there were no societal or economic contraints.",leader:"Umang Vohra",status:"Completed",studyTypes:["Consumer Segmentation"]},{id:22,year:1995,company:"Pond's India Ltd",industry:"FMCG",title:"Ad-Effectiveness Test Of ''Rexona'' Tvcs",objectives:"to evaluate the creative on the following parameters- comprehension, credibility, persuasiveness and image",leader:"Rajive Raman",status:"Completed",studyTypes:["Consumer Perception & Attitude"]},{id:23,year:1995,company:"Sri Jaya Food Industries",industry:"FMCG",title:"Customer Perception & Brand Personality Of 'Bambino' Vermicelli",objectives:"1. to fi
